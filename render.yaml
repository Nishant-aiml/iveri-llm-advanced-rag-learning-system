services:
  - type: web
    name: iveri-llm-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_API_URL
        value: https://api.sarvam.ai/v1/chat/completions
