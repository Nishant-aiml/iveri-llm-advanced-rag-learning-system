services:
  - type: web
    name: iveri-llm-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    # Python minor version is NOT only in the UI; use backend/.python-version and/or PYTHON_VERSION below.
    # PyMuPDF wheels: use 3.11/3.12 — Render default for new services may be 3.14.x.
    buildCommand: python -V && pip install --upgrade pip && pip install -r requirements.txt
    # Render runs the start command in a shell; bind 0.0.0.0 and use $PORT from the platform.
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_API_URL
        value: https://api.sarvam.ai/v1/chat/completions
      - key: PIPELINE_MIN_WORKERS
        value: "1"
      - key: PIPELINE_DEFAULT_WORKERS
        value: "3"
      - key: PIPELINE_MAX_WORKERS
        value: "8"
